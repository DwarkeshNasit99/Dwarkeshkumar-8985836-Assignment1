name: Calculator App CI Pipeline

on:
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run tests
      run: |
        python -m pytest tests/ --cov=src --cov-report=xml

  docker-build-and-run:
    needs: build-and-test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker image
      run: docker build -t calculator-app .
      
    - name: Run container
      run: |
        docker run -d --name calculator-container calculator-app
        sleep 5
        docker ps
        docker logs calculator-container
        docker stop calculator-container
        docker rm calculator-container 


        